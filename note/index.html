<!doctype html>
<html lang="ko">
<head><script src="/auth-gate.js"></script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stella 노트</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a4731">
<meta name="description" content="Stella Clover 노트 — 메모 작성/검색 (Stella GPT와 노트 공유)">
<style>
/* ── 테마 토큰 (Clover / Flow / Rate 와 공유: localStorage cl_theme) ── */
:root{
  --bg:#eef3ee; --surface:#ffffff; --surface2:#f9fafb; --border:#e5e7eb;
  --text:#111827; --text2:#6b7280; --text3:#9ca3af;
  --brand:#1a4731; --brand2:#2d6a4f; --accent:#34d399; --accentbg:#ecfdf5;
  --danger:#dc2626; --dangerbg:#fff5f5; --shadow:0 2px 12px rgba(0,0,0,.07);
}
[data-theme=dark]{
  --bg:#0f1713; --surface:#16211b; --surface2:#1c2a22; --border:#2a3a30;
  --text:#e6efe9; --text2:#9fb3a7; --text3:#7d8f84;
  --brand:#34d399; --brand2:#5eead4; --accent:#34d399; --accentbg:#10241b;
  --danger:#f87171; --dangerbg:#2a1414; --shadow:0 2px 14px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}
button,input,textarea{font-family:inherit}

.appbar{position:sticky;top:0;z-index:30;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
.appbar-in{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:10px 14px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:7px;font-weight:900;font-size:1.05rem;white-space:nowrap}
.logo .leaf{font-size:1.2rem}
.spacer{flex:1}
.linkbtn{border:none;background:rgba(255,255,255,.16);color:#fff;border-radius:9px;padding:6px 10px;font-size:.78rem;font-weight:700;text-decoration:none;min-height:36px;display:flex;align-items:center;gap:4px}
.iconbtn{border:none;background:rgba(255,255,255,.16);color:#fff;border-radius:9px;width:38px;height:36px;font-size:1rem}

.app{max-width:720px;margin:0 auto;padding:14px 14px 60px}

.search-box{display:flex;gap:8px;margin-bottom:12px}
.search-box input{flex:1;min-width:0;border:2px solid var(--border);border-radius:12px;padding:10px 14px;font-size:.9rem;outline:none;background:var(--surface);color:var(--text)}
.search-box input:focus{border-color:var(--brand2)}
.new-btn{width:100%;height:48px;border:none;border-radius:14px;background:var(--brand);color:#fff;font-size:.94rem;font-weight:800;cursor:pointer;margin-bottom:14px}
.new-btn:hover{background:var(--brand2)}

.note-card{display:flex;flex-direction:column;gap:4px;padding:14px;border:1px solid var(--border);border-radius:14px;margin-bottom:8px;background:var(--surface);box-shadow:var(--shadow);cursor:pointer}
.note-card:hover{border-color:var(--brand2)}
.note-title{font-weight:800;font-size:.92rem}
.note-body{font-size:.8rem;color:var(--text2);white-space:pre-wrap;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.note-meta{font-size:.72rem;color:var(--text3)}

.empty{color:var(--text3);text-align:center;font-size:.85rem;padding:40px 10px}

/* ── 에디터 모달: 세로를 거의 가득(모바일 풀스크린, PC 92vh) + 본문 flex + 하단 버튼 고정 ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.modal.show{display:flex}
.modal-content{background:var(--surface);color:var(--text);border-radius:18px;display:flex;flex-direction:column;
  width:100%;max-width:760px;height:92vh;height:92dvh;max-height:92vh;max-height:92dvh;padding:0;overflow:hidden;box-shadow:var(--shadow)}
.modal-head{display:flex;align-items:center;gap:8px;padding:14px 16px 10px;border-bottom:1px solid var(--border);flex:0 0 auto}
.modal-head strong{font-size:1.02rem}
.modal-close{margin-left:auto;border:none;background:none;font-size:1.5rem;cursor:pointer;color:var(--text3);line-height:1}
.editor-scroll{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;padding:12px 16px}
.title-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-size:1rem;font-weight:700;background:var(--surface2);color:var(--text);outline:none;margin-bottom:8px;flex:0 0 auto}
.body-input{flex:1 1 auto;min-height:0;width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-size:.9rem;line-height:1.7;background:var(--surface2);color:var(--text);outline:none;resize:none;overflow-y:auto}
.title-input:focus,.body-input:focus{border-color:var(--brand2)}
.modal-btns{display:flex;gap:8px;flex:0 0 auto;padding:10px 14px;border-top:1px solid var(--border);background:var(--surface);padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.mbtn{flex:1;height:46px;border:none;border-radius:12px;font-size:.9rem;font-weight:800;cursor:pointer}
.mbtn.save{background:var(--brand);color:#fff;flex:2}
.mbtn.save:hover{background:var(--brand2)}
.mbtn.save:disabled{opacity:.55;cursor:not-allowed}
.mbtn.del{background:var(--dangerbg);color:var(--danger)}
@media(max-width:560px){
  #editorModal{padding:0}
  .modal-content{height:100vh;height:100dvh;max-height:100vh;max-height:100dvh;border-radius:0;max-width:100%}
}

.toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(20px);background:var(--brand);color:#fff;padding:10px 18px;border-radius:12px;font-size:.85rem;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header class="appbar"><div class="appbar-in">
  <div class="logo"><span class="leaf">📝</span> Stella 노트</div>
  <div class="spacer"></div>
  <a class="linkbtn" href="/" title="Stella Clover">🍀 Clover</a>
  <button class="iconbtn" id="themeToggle" onclick="toggleTheme()" title="다크/라이트">🌙</button>
</div></header>

<div class="app">
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="제목/내용 검색" oninput="onSearchInput()">
  </div>
  <button class="new-btn" onclick="openEditor(null)">+ 새 노트</button>
  <div id="list"></div>
</div>

<div class="modal" id="editorModal">
  <div class="modal-content">
    <div class="modal-head">
      <strong id="editorHead">새 노트</strong>
      <button class="modal-close" onclick="closeEditor()">&times;</button>
    </div>
    <div class="editor-scroll">
      <input class="title-input" id="titleInput" type="text" placeholder="제목" maxlength="300">
      <textarea class="body-input" id="bodyInput" placeholder="내용을 입력하세요"></textarea>
    </div>
    <div class="modal-btns">
      <button class="mbtn del" id="deleteBtn" onclick="deleteCurrent()" style="display:none">🗑 삭제</button>
      <button class="mbtn save" id="saveBtn" onclick="saveCurrent()">💾 저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var $=function(id){return document.getElementById(id);};
var THEME_KEY='cl_theme';
var notes=[];
var currentId=null;
var _cache={};        // stale-while-revalidate 메모리 캐시: q별 마지막 페이지1까지의 items
var _page=0;
var _q='';
var _hasMore=false;
function cacheKey(q){ return 'q:'+q; }

// 전체 페이지 이동(별개 SPA라 index.html→/notes는 새 문서 로드)에도 첫 화면(검색어 없음)만은
// localStorage 로 넘겨받아 즉시 그린다 — index.html 이 유휴 시간에 미리 채워두면(prefetchNotesCache)
// /notes 진입 첫 렌더가 네트워크를 기다리지 않는다. index.html 과 키/모양을 동일하게 유지할 것.
var NOTES_CACHE_KEY='cl_notes_cache_v1';
(function hydrateFromPersistedCache(){
  try{
    var saved=JSON.parse(localStorage.getItem(NOTES_CACHE_KEY)||'null');
    if(saved && Array.isArray(saved.items)) _cache[cacheKey('')]=saved;
  }catch(e){}
})();

/* ── 노트 본문 캐시(SWR): 한 번 연 노트는 재열람 시 네트워크 없이 즉시 표시, 백그라운드로 갱신 ──
   메모리(_bodyCache) + localStorage(cl_note_body_cache_v1) 이중 캐시, id별 {body,updatedAt,cachedAt}. */
var BODY_CACHE_KEY='cl_note_body_cache_v1';
var BODY_CACHE_MAX=300; // 과대 성장 방지(오래된 항목부터 제거)
var _bodyCache={};
var _bodyDirty=false; // 사용자가 본문을 직접 편집했으면(프로그램적 세팅은 'input' 이벤트 미발생) 백그라운드 갱신으로 덮어쓰지 않음
(function hydrateBodyCache(){
  try{
    var saved=JSON.parse(localStorage.getItem(BODY_CACHE_KEY)||'null');
    if(saved && typeof saved==='object') _bodyCache=saved;
  }catch(e){}
})();
function persistBodyCache(){
  try{
    var keys=Object.keys(_bodyCache);
    if(keys.length>BODY_CACHE_MAX){
      keys.sort(function(a,b){return (_bodyCache[a].cachedAt||0)-(_bodyCache[b].cachedAt||0);});
      keys.slice(0, keys.length-BODY_CACHE_MAX).forEach(function(k){ delete _bodyCache[k]; });
    }
    localStorage.setItem(BODY_CACHE_KEY, JSON.stringify(_bodyCache));
  }catch(e){}
}

/* ── 본문 프리페치: 목록에서 마우스를 올리거나(hover) 터치를 시작하는 순간(touchstart) 클릭보다
   먼저 본문을 받아 _bodyCache 를 채운다 — 실제로 열 때(openEditor)는 같은 요청을 공유해서 기다리므로
   중복 호출 없이 "이미 도착해 있는" 체감으로 열린다. id별 진행 중 요청은 1개로 합침(de-dupe). */
var _prefetchInflight={};
var PREFETCH_FRESH_MS=15000; // 최근에 채운 캐시는 재요청하지 않음(과도한 hover 재발화 방지)
// 서로 다른 id 동시 프리페치 상한. 초과분은 "가장 오래된 요청을 취소"하지 않고 그냥 스킵한다 —
// 이미 네트워크로 나간 요청은 취소해도 서버 부담이 줄지 않고, 클릭(openEditor)은 이 상한과 무관하게
// 항상 fetchNoteBody 를 새로 호출하므로 스킵해도 실제 열람 시 회귀가 없다(더 단순하고 안전한 선택).
var PREFETCH_MAX_CONCURRENT=3;
function canStartPrefetch(id){
  var cached=_bodyCache[id];
  if(cached && (Date.now()-(cached.cachedAt||0))<PREFETCH_FRESH_MS) return false; // 이미 신선함
  if(_prefetchInflight[id]) return false; // 이미 진행 중(다른 트리거가 먼저 걸었음)
  if(Object.keys(_prefetchInflight).length >= PREFETCH_MAX_CONCURRENT) return false; // 동시 상한 초과
  return true;
}
function fetchNoteBody(id, signal){
  if(_prefetchInflight[id]) return _prefetchInflight[id];
  var opts = signal ? { signal: signal } : undefined;
  var p = fetch('/api/notes?action=get&id='+encodeURIComponent(id), opts)
    .then(function(r){ return safeJson(r); })
    .then(function(d){
      if(d && d.ok && d.item){
        _bodyCache[id] = { body: d.item.body||'', updatedAt: d.item.updatedAt||null, cachedAt: Date.now() };
        persistBodyCache();
        return d.item;
      }
      var err = new Error((d&&d.message)||'본문을 불러오지 못했습니다');
      err.isApiError = true;
      throw err;
    });
  _prefetchInflight[id] = p;
  // 취소(AbortError)든 실패든 여기서 in-flight 등록을 해제 — 이후 openEditor 클릭이 새 요청을 다시 시작할 수 있어야 한다.
  p.finally(function(){ if(_prefetchInflight[id]===p) delete _prefetchInflight[id]; });
  return p;
}
function prefetchNote(id){
  if(!id || !canStartPrefetch(id)) return;
  fetchNoteBody(id).catch(function(){}); // 프리페치 실패는 조용히 무시(클릭 시 openEditor 가 다시 시도)
}

/* ── 터치 프리페치(스크롤 오탐 방지): touchstart 좌표를 기록하고 TOUCH_PREFETCH_DELAY_MS 만큼
   대기했다가 발동한다 — 그 사이 touchmove 가 임계값(10px) 이상 움직이면(=스크롤) 아직 안 나간
   요청은 타이머만 지워 아예 트리거하지 않고, 이미 나간 요청은 AbortController 로 중단한다.
   목록 컨테이너 1곳에만 위임 바인딩(카드마다 리스너를 달지 않음) + passive 라 스크롤 성능에 영향 없다. */
var TOUCH_PREFETCH_DELAY_MS=70;
var TOUCH_MOVE_THRESHOLD_SQ=10*10;
var _touchPrefetch=null; // {x,y,timer,controller}
function cancelTouchPrefetch(){
  if(!_touchPrefetch) return;
  if(_touchPrefetch.timer){ clearTimeout(_touchPrefetch.timer); }
  if(_touchPrefetch.controller){ _touchPrefetch.controller.abort(); }
  _touchPrefetch=null;
}
function startTouchPrefetch(id, x, y){
  cancelTouchPrefetch();
  var state={ x:x, y:y, timer:null, controller:null };
  state.timer=setTimeout(function(){
    state.timer=null;
    if(!canStartPrefetch(id)) return;
    state.controller = ('AbortController' in window) ? new AbortController() : null;
    fetchNoteBody(id, state.controller && state.controller.signal).catch(function(){});
  }, TOUCH_PREFETCH_DELAY_MS);
  _touchPrefetch=state;
}
function bindListTouch(){
  var list=$('list');
  if(!list || list._touchBound) return;
  list._touchBound=true;
  list.addEventListener('touchstart', function(e){
    var card=e.target.closest('.note-card');
    var t=e.touches[0];
    var id=card && card.getAttribute('data-id');
    if(!id || !t) return;
    startTouchPrefetch(id, t.clientX, t.clientY);
  }, {passive:true});
  list.addEventListener('touchmove', function(e){
    if(!_touchPrefetch) return;
    var t=e.touches[0];
    if(!t) return;
    var dx=t.clientX-_touchPrefetch.x, dy=t.clientY-_touchPrefetch.y;
    if((dx*dx+dy*dy) > TOUCH_MOVE_THRESHOLD_SQ) cancelTouchPrefetch(); // 스크롤로 판단 — 취소
  }, {passive:true});
  list.addEventListener('touchend', function(){ _touchPrefetch=null; }, {passive:true}); // 발동된 요청은 그대로 진행(정상 탭)
  list.addEventListener('touchcancel', function(){ cancelTouchPrefetch(); }, {passive:true});
}

/* ── 한글 IME composition 가드 (제목/본문/검색) ──
   조합 중(한글 입력 미완)에는 검색을 재실행하지 않고, 저장 시엔 조합을 먼저 확정한다. */
var _composing=false;
function bindIme(el){ if(!el||el._imeBound)return; el._imeBound=true;
  el.addEventListener('compositionstart',function(){_composing=true;});
  el.addEventListener('compositionend',function(){_composing=false; if(el.id==='searchInput') onSearchInput();});
}

/* ── 테마 (Clover 앱과 공유) ── */
function applyTheme(){var t=localStorage.getItem(THEME_KEY)||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme',t);$('themeToggle').textContent=t==='dark'?'☀️':'🌙';}
function toggleTheme(){var cur=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  localStorage.setItem(THEME_KEY,cur);applyTheme();}

var _tt;
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},2200);}

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function todayStr(){
  var d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

async function safeJson(res){
  var text = await res.text();
  try { return JSON.parse(text); } catch(e) { return { ok:false, message:'서버 응답 파싱 실패' }; }
}

/* ── 목록/검색 ── */
var _searchT;
function onSearchInput(){ if(_composing) return; clearTimeout(_searchT); _searchT=setTimeout(loadNotes, 300); } // 조합 중 재검색 억제(compositionend 에서 재개)

// stale-while-revalidate: 캐시가 있으면 즉시 그려 보여주고(정체 데이터), 그 사이 최신 응답으로
// 조용히 갱신한다 — 목록 첫 화면(page 0)만 캐시 대상(30건, note-card 리스트 상단).
async function loadNotes(){
  var q = $('searchInput').value.trim();
  _q = q; _page = 0;
  var key = cacheKey(q);
  var cached = _cache[key];
  if(cached){
    notes = cached.items.slice();
    _hasMore = cached.hasMore;
    renderList();
  } else {
    $('list').innerHTML = '<div class="empty">불러오는 중…</div>';
  }
  try{
    var r = await fetch('/api/notes?action=list&page=0&q='+encodeURIComponent(q));
    var d = await safeJson(r);
    if(_q!==q) return; // 응답 도착 전에 검색어가 바뀌었으면 무시(경합 방지)
    if(!d.ok){ if(!cached){ $('list').innerHTML='<div class="empty">'+esc(d.message||'노트를 불러오지 못했습니다')+'</div>'; notes=[]; } return; }
    notes = d.items||[];
    _hasMore = !!d.hasMore;
    _cache[key] = { items: notes.slice(), hasMore: _hasMore };
    if(!q){ try{ localStorage.setItem(NOTES_CACHE_KEY, JSON.stringify(_cache[key])); }catch(e){} }
    renderList();
  }catch(e){
    if(!cached) $('list').innerHTML = '<div class="empty">네트워크 오류: '+esc(e.message||e)+'</div>';
  }
}

async function loadMore(){
  if(!_hasMore) return;
  var q = _q, nextPage = _page + 1;
  try{
    var r = await fetch('/api/notes?action=list&page='+nextPage+'&q='+encodeURIComponent(q));
    var d = await safeJson(r);
    if(_q!==q || !d.ok) return;
    _page = nextPage;
    notes = notes.concat(d.items||[]);
    _hasMore = !!d.hasMore;
    _cache[cacheKey(q)] = { items: notes.slice(), hasMore: _hasMore };
    renderList();
  }catch(e){ toast('네트워크 오류: '+(e.message||e)); }
}

function renderList(){
  if(!notes.length){ $('list').innerHTML='<div class="empty">노트가 없습니다. "+ 새 노트"로 시작하세요.</div>'; return; }
  var html = notes.map(function(n){
    var when = n.updatedAt ? new Date(n.updatedAt).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    return '<div class="note-card" data-id="'+esc(n.id)+'" onclick="openEditor(\''+esc(n.id)+'\')" onmouseenter="prefetchNote(\''+esc(n.id)+'\')">'
      + '<div class="note-title">'+esc(n.title||'제목 없음')+'</div>'
      + '<div class="note-body">'+esc(n.preview||n.body||'')+'</div>'
      + '<div class="note-meta">'+esc(when)+'</div>'
      + '</div>';
  }).join('');
  if(_hasMore) html += '<button class="new-btn" style="background:var(--surface2);color:var(--text);box-shadow:none;border:1px solid var(--border)" onclick="loadMore()">더 보기</button>';
  $('list').innerHTML = html;
}

/* ── 편집기 ──
   즉시 열림: 모달은 네트워크를 기다리지 않고 바로 뜬다. 본문 캐시가 있으면(재열람) 그걸
   바로 보여주고 저장도 즉시 가능(이미 전체 본문 보유) — 없으면 목록 미리보기(200자)를 우선
   보여준 뒤(저장은 잠금, 잘림 방지) 전체 본문이 도착하면 교체하고 저장을 푼다. */
async function openEditor(id){
  currentId = id;
  _bodyDirty = false;
  var n = id ? notes.find(function(x){return x.id===id;}) : null;
  var cached = id ? _bodyCache[id] : null;
  $('editorHead').textContent = n ? '노트 편집' : '새 노트';
  $('titleInput').value = n ? (n.title||'') : todayStr();
  $('bodyInput').value = cached ? cached.body : (n ? (n.preview||'') : '');
  $('deleteBtn').style.display = n ? 'block' : 'none';
  $('saveBtn').disabled = !!id && !cached; // 전체 본문을 이미 캐시로 갖고 있으면 즉시 저장 허용
  $('editorModal').classList.add('show');
  setTimeout(function(){ $('titleInput').focus(); if(!n) $('titleInput').select(); }, 50);

  if(id){
    // SWR: 캐시가 있어도 최신본으로 백그라운드 갱신(다른 기기/Stella GPT에서 고쳤을 수 있음).
    // hover/touchstart 프리페치가 이미 요청 중이면 fetchNoteBody 가 그 요청을 그대로 공유한다.
    try{
      var item = await fetchNoteBody(id);
      if(currentId!==id) return; // 그 사이 다른 노트를 열었으면 무시
      if(!_bodyDirty) $('bodyInput').value = item.body||'';
      $('saveBtn').disabled = false;
    }catch(e){
      if(currentId!==id) return;
      if(!cached) toast(e.isApiError ? e.message : ('네트워크 오류: '+(e.message||e))); // 캐시가 있으면 이미 보여준 본문 유지, 저장도 이미 허용된 상태
    }
  }
}
function closeEditor(){ $('editorModal').classList.remove('show'); currentId=null; _bodyDirty=false; }

async function saveCurrent(){
  if(document.activeElement && document.activeElement.blur) document.activeElement.blur(); // 진행 중 한글 조합 확정 후 값 읽기
  var title = $('titleInput').value.trim();
  var body = $('bodyInput').value;
  if(!title && !body){ toast('제목이나 내용을 입력하세요'); return; }
  try{
    var r = await fetch('/api/notes?action=save', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id: currentId, title: title, body: body })
    });
    var d = await safeJson(r);
    if(!d.ok){ toast(d.message||'저장 실패'); return; }
    toast('저장되었습니다');
    _bodyCache[d.item.id] = { body: d.item.body||'', updatedAt: d.item.updatedAt||null, cachedAt: Date.now() };
    persistBodyCache();
    closeEditor();
    _cache={}; try{ localStorage.removeItem(NOTES_CACHE_KEY); }catch(e){} // 방금 쓴 변경을 즉시 반영(캐시된 옛 목록으로 잠깐 되돌아가지 않도록, 영속 캐시도 함께)
    loadNotes();
  }catch(e){ toast('네트워크 오류: '+(e.message||e)); }
}

async function deleteCurrent(){
  if(!currentId) return;
  if(!confirm('이 노트를 삭제할까요?')) return;
  try{
    var r = await fetch('/api/notes?action=delete', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id: currentId })
    });
    var d = await safeJson(r);
    if(!d.ok){ toast(d.message||'삭제 실패'); return; }
    toast('삭제되었습니다');
    delete _bodyCache[currentId]; persistBodyCache();
    closeEditor();
    _cache={}; try{ localStorage.removeItem(NOTES_CACHE_KEY); }catch(e){} // 방금 지운 노트가 캐시된 옛 목록에 다시 나타나지 않도록, 영속 캐시도 함께
    loadNotes();
  }catch(e){ toast('네트워크 오류: '+(e.message||e)); }
}

/* ── 초기화 ── */
applyTheme();
bindIme($('titleInput')); bindIme($('bodyInput')); bindIme($('searchInput')); // IME 조합 가드
$('bodyInput').addEventListener('input', function(){ _bodyDirty = true; }); // 사용자 편집 중엔 SWR 백그라운드 응답으로 덮어쓰지 않음
bindListTouch(); // 목록 컨테이너에 터치 프리페치 위임 바인딩(카드 재렌더와 무관하게 1회만)
loadNotes();
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}
</script>
</body>
</html>
