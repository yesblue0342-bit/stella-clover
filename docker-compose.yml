# Stella Clover — PostgreSQL + 앱 (OCI Ubuntu, Docker). Azure(azure-sql-edge) 완전 대체.
#   배포:  cp .env.example .env  → 값 채우기 →  docker compose up -d --build
#   갱신:  git pull && docker compose up -d --build
#   확인:  curl http://localhost:8842/healthz
#
# gpt.이후.com 라우팅: nginx-proxy-manager 의 Proxy Host 를
#   Forward → <서버IP>:8842  (또는 NPM 네트워크에 app 을 붙여 stella-clover:8842) 로 지정.
# 기존 stella-mssql(azure-sql-edge) 컨테이너는 이관 후 제거: docker rm -f stella-mssql

services:
  db:
    image: postgres:16-alpine
    container_name: stella-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-stella}
      POSTGRES_USER: ${PGUSER:-stella}
      POSTGRES_PASSWORD: ${PGPASSWORD:?PGPASSWORD를 .env에 설정하세요}
    volumes:
      - stella_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-stella} -d ${PGDATABASE:-stella}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: stella-clover:latest
    container_name: stella-clover
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8842
      MAX_BODY_BYTES: ${MAX_BODY_BYTES:-31457280}
      # 앱은 DATABASE_URL 로 내부 db 서비스(컨테이너명 db)에 접속. 같은 호스트라 SSL 불필요.
      DATABASE_URL: postgres://${PGUSER:-stella}:${PGPASSWORD}@db:5432/${PGDATABASE:-stella}
      PGSSL: disable
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN}
      CRON_SECRET: ${CRON_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    ports:
      - "8842:8842"

volumes:
  stella_pgdata:
