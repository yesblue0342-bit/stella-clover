<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stella Talk</title>
<meta name="theme-color" content="#1a4731">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f0;color:#111827;height:100vh;display:flex;flex-direction:column}
.app{max-width:600px;width:100%;margin:0 auto;display:flex;flex-direction:column;height:100vh}
.header{background:linear-gradient(135deg,#1a4731,#2d6a4f);padding:14px 16px;color:#fff;display:flex;align-items:center;gap:10px}
.header h1{font-size:1.1rem;font-weight:900;flex:1}
.icon-btn{position:relative;border:none;background:rgba(255,255,255,.18);color:#fff;border-radius:10px;width:38px;height:38px;font-size:1.1rem;cursor:pointer}
.badge{position:absolute;top:-5px;right:-5px;background:#ef4444;color:#fff;border-radius:99px;min-width:18px;height:18px;font-size:.7rem;font-weight:800;display:none;align-items:center;justify-content:center;padding:0 4px}
.badge.show{display:flex}
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:78%;padding:9px 13px;border-radius:14px;font-size:.92rem;line-height:1.45;word-break:break-word;white-space:pre-wrap}
.msg.me{align-self:flex-end;background:#1a4731;color:#fff;border-bottom-right-radius:4px}
.msg.them{align-self:flex-start;background:#fff;border:1px solid #e5e7eb;border-bottom-left-radius:4px}
.msg img{max-width:100%;border-radius:10px;display:block}
.msg .time{display:block;font-size:.65rem;opacity:.6;margin-top:3px}
.composer{display:flex;gap:8px;padding:10px;background:#fff;border-top:1px solid #e5e7eb;align-items:center}
.composer input[type=text]{flex:1;border:1px solid #d1d5db;border-radius:99px;padding:10px 16px;font-size:.95rem;outline:none}
.composer input[type=text]:focus{border-color:#2d6a4f}
.composer button{border:none;background:#1a4731;color:#fff;border-radius:50%;width:42px;height:42px;font-size:1.1rem;cursor:pointer;flex-shrink:0}
.composer button:disabled{background:#9ca3af}
input[type=file]{display:none}
#loginView{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center}
#loginView .clover{font-size:3rem}
#loginView input{border:1px solid #d1d5db;border-radius:12px;padding:12px 16px;font-size:1rem;width:100%;max-width:280px;outline:none}
#loginView button{border:none;background:#1a4731;color:#fff;border-radius:12px;padding:12px 24px;font-size:1rem;font-weight:800;cursor:pointer}
#avatarPick span{cursor:pointer;opacity:.4;transition:transform .15s,opacity .15s}
#avatarPick span.sel{opacity:1;transform:scale(1.25)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span id="hdrAvatar" style="font-size:1.4rem">🍀</span>
    <h1>Stella Talk</h1>
    <button class="icon-btn" id="bellBtn" onclick="markRead()" title="안읽음 메시지">🔔<span class="badge" id="unreadBadge"></span></button>
    <button class="icon-btn" onclick="clearChat()" title="대화 비우기">🗑</button>
  </div>

  <div id="loginView">
    <div class="clover">🍀</div>
    <div style="font-weight:800;font-size:1.1rem">Stella Talk 회원가입</div>
    <input id="nickInput" type="text" placeholder="닉네임을 입력하세요" maxlength="20" onkeydown="if(event.key==='Enter')doLogin()">
    <div id="avatarPick" style="display:flex;gap:10px;font-size:1.8rem">
      <span class="sel" onclick="pickAvatar(this,'🍀')">🍀</span>
      <span onclick="pickAvatar(this,'😊')">😊</span>
      <span onclick="pickAvatar(this,'🐱')">🐱</span>
      <span onclick="pickAvatar(this,'🚀')">🚀</span>
    </div>
    <button onclick="doLogin()">가입하고 시작</button>
  </div>

  <div id="messages" hidden></div>

  <div class="composer" id="composer" hidden>
    <button onclick="document.getElementById('imgInput').click()" title="이미지">📷</button>
    <input type="file" id="imgInput" accept="image/*" capture="environment" onchange="onImage(this)">
    <input type="text" id="msgInput" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')send()">
    <button id="sendBtn" onclick="send()" title="전송">➤</button>
  </div>
</div>

<script>
const MSG_KEY='stella_talk_msgs', USER_KEY='stella_talk_user', USERS_KEY='stella_talk_users';
let _user=null, _avatar='🍀', _msgs=[], _unread=0;

function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function save(){try{localStorage.setItem(MSG_KEY,JSON.stringify(_msgs.slice(-200)));}catch(e){}}

// ── 알림음 (Web Audio 비프) ──
let _audioCtx=null;
function beep(){
  try{
    _audioCtx=_audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const o=_audioCtx.createOscillator(), g=_audioCtx.createGain();
    o.connect(g);g.connect(_audioCtx.destination);
    o.type='sine';o.frequency.value=660;
    g.gain.setValueAtTime(0.001,_audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.25,_audioCtx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,_audioCtx.currentTime+0.25);
    o.start();o.stop(_audioCtx.currentTime+0.26);
  }catch(e){}
}

// ── 렌더링 (속도: 새 메시지는 append만, 전체 재렌더 안 함) ──
function msgEl(m){
  const d=document.createElement('div');
  d.className='msg '+(m.from===_user?'me':'them');
  const t=new Date(m.ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  d.innerHTML=(m.img?`<img src="${m.img}" alt="">`:'')+(m.text?esc(m.text):'')+`<span class="time">${esc(m.from)} · ${t}</span>`;
  return d;
}
function appendMsg(m){
  const box=document.getElementById('messages');
  box.appendChild(msgEl(m));
  box.scrollTop=box.scrollHeight;
}
function renderAll(){
  const box=document.getElementById('messages');
  box.innerHTML='';
  _msgs.forEach(m=>box.appendChild(msgEl(m)));
  box.scrollTop=box.scrollHeight;
}

function pushMessage(m){
  _msgs.push(m);save();appendMsg(m);
  if(m.from!==_user && document.hidden){_unread++;updateBadge();}
}

// ── 안읽음 배지 ──
function updateBadge(){
  const b=document.getElementById('unreadBadge');
  if(_unread>0){b.textContent=_unread>99?'99+':_unread;b.classList.add('show');document.title='('+_unread+') Stella Talk';}
  else{b.classList.remove('show');document.title='Stella Talk';}
}
function markRead(){_unread=0;updateBadge();}
document.addEventListener('visibilitychange',()=>{if(!document.hidden)markRead();});
window.addEventListener('focus',markRead);

function send(){
  const inp=document.getElementById('msgInput');
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';
  pushMessage({from:_user,text,ts:Date.now()});
  botReply(text);
}
function onImage(input){
  const f=input.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=()=>{pushMessage({from:_user,img:reader.result,ts:Date.now()});botReply('(이미지)');};
  reader.readAsDataURL(f);
  input.value='';
}

// 로컬 데모 응답 (백엔드 없음): 알림음/배지 동작 확인용
function botReply(userText){
  setTimeout(()=>{
    const reply='“'+userText.slice(0,40)+'” 잘 받았어요! 🍀';
    pushMessage({from:'Stella',text:reply,ts:Date.now()});
    beep();
  },900);
}

function clearChat(){
  if(!confirm('대화를 모두 지울까요?'))return;
  _msgs=[];save();renderAll();
}

function pickAvatar(el,a){
  _avatar=a;
  document.querySelectorAll('#avatarPick span').forEach(s=>s.classList.remove('sel'));
  el.classList.add('sel');
}
function doLogin(){
  const nick=document.getElementById('nickInput').value.trim();
  if(!nick){document.getElementById('nickInput').focus();return;}
  _user=nick;
  const profile={nick,avatar:_avatar,joined:Date.now()};
  try{
    localStorage.setItem(USER_KEY,JSON.stringify(profile));
    // 회원 목록(로컬)에 등록 - 같은 닉네임은 갱신
    const users=JSON.parse(localStorage.getItem(USERS_KEY)||'[]').filter(u=>u.nick!==nick);
    users.push(profile);localStorage.setItem(USERS_KEY,JSON.stringify(users));
  }catch(e){}
  enterChat();
}
function enterChat(){
  document.getElementById('hdrAvatar').textContent=_avatar;
  document.getElementById('loginView').hidden=true;
  document.getElementById('messages').hidden=false;
  document.getElementById('composer').hidden=false;
  renderAll();updateBadge();
  document.getElementById('msgInput').focus();
}

// ── 초기화 ──
try{_msgs=JSON.parse(localStorage.getItem(MSG_KEY)||'[]');}catch(e){_msgs=[];}
try{
  const raw=localStorage.getItem(USER_KEY);
  if(raw){const p=JSON.parse(raw);_user=p.nick;_avatar=p.avatar||'🍀';}
}catch(e){_user=localStorage.getItem(USER_KEY)||null;} // 구버전(문자열) 호환
if(_user){enterChat();}
</script>
</body>
</html>
