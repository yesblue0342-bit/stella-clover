<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stella Clover</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a4731">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stella Clover">
<meta name="description" content="AI 회의록 자동 생성 - 음성 파일을 회의록으로">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f0;color:#111827;min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:16px;padding-bottom:40px}

/* 헤더 */
.header{background:linear-gradient(135deg,#1a4731,#2d6a4f);border-radius:20px;padding:20px;margin-bottom:16px;color:#fff}
.header h1{font-size:1.5rem;font-weight:900;letter-spacing:-.5px}
.header p{font-size:.85rem;opacity:.75;margin-top:4px}
.clover{font-size:1.8rem;margin-bottom:6px}

/* 카드 */
.card{background:#fff;border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.card-title{font-size:.8rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}

/* 녹음 버튼 */
.rec-btn{width:100%;height:80px;border:3px dashed #d1fae5;border-radius:16px;background:#f0fff4;color:#1a4731;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;margin-bottom:12px}
.rec-btn.recording{border-color:#ef4444;background:#fff5f5;color:#ef4444;animation:pulse 1.2s infinite}
.rec-btn.done{border-style:solid;border-color:#34d399;background:#ecfdf5}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* 파일 업로드 */
.file-area{border:2px dashed #d1d5db;border-radius:14px;padding:20px;text-align:center;cursor:pointer;color:#6b7280;transition:all .2s;margin-bottom:12px}
.file-area:hover,.file-area.drag{border-color:#2d6a4f;background:#f0fff4;color:#2d6a4f}
.file-area.has-file{border-color:#34d399;border-style:solid;background:#ecfdf5;color:#1a4731}
.file-name{font-weight:700;font-size:.9rem}
input[type=file]{display:none}

/* 언어 선택 */
.lang-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.lang-row label{font-size:.82rem;color:#6b7280;font-weight:700;white-space:nowrap}
.lang-sel{flex:1;height:44px;border:1px solid #d1d5db;border-radius:12px;padding:0 12px;font-size:.9rem;background:#fff;color:#111827}

/* 생성 버튼 */
.gen-btn{width:100%;height:56px;border:none;border-radius:14px;background:#1a4731;color:#fff;font-size:1.05rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.gen-btn:hover{background:#2d6a4f}
.gen-btn:disabled{background:#9ca3af;cursor:not-allowed}

/* 진행 상태 */
.progress{background:#f9fafb;border-radius:12px;padding:14px;margin-top:14px;display:none}
.progress-bar-wrap{background:#e5e7eb;border-radius:99px;height:8px;margin:10px 0}
.progress-bar{background:linear-gradient(90deg,#2d6a4f,#34d399);height:8px;border-radius:99px;width:0;transition:width .5s}
.progress-step{font-size:.82rem;color:#374151;font-weight:600}
.progress-detail{font-size:.75rem;color:#9ca3af;margin-top:4px}

/* 결과 */
.result-area{display:none}
.summary-box{background:#f9fafb;border-radius:14px;padding:16px;font-size:.88rem;line-height:1.75;white-space:pre-wrap;max-height:400px;overflow-y:auto;border:1px solid #e5e7eb;margin-bottom:12px}
.result-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.rbtn{height:48px;border:2px solid #e5e7eb;border-radius:12px;background:#fff;font-size:.88rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;color:#374151;transition:all .2s}
.rbtn:hover{border-color:#2d6a4f;color:#2d6a4f}
.rbtn.drive{grid-column:1/-1;background:#2d6a4f;color:#fff;border-color:#2d6a4f}
.rbtn.drive:hover{background:#1a4731}

/* 검색 */
.search-input{width:100%;height:42px;border:1px solid #d1d5db;border-radius:12px;padding:0 12px;font-size:.88rem;margin-bottom:10px}
.search-input:focus{outline:none;border-color:#2d6a4f}

/* 회의 목록 */
.meeting-item{display:flex;align-items:flex-start;gap:8px;padding:12px;border:1px solid #e5e7eb;border-radius:12px;margin-bottom:8px;transition:all .2s}
.meeting-item:hover{border-color:#2d6a4f;background:#f0fff4}
.meeting-main{flex:1;min-width:0;cursor:pointer}
.meeting-item .mtitle{font-weight:700;font-size:.9rem;margin-bottom:2px}
.meeting-item .mdate{font-size:.75rem;color:#9ca3af}
.badge{display:inline-block;background:#ecfdf5;color:#2d6a4f;border-radius:6px;padding:2px 8px;font-size:.72rem;font-weight:700;margin-left:6px}
.del-btn{border:none;background:none;cursor:pointer;font-size:1rem;color:#9ca3af;padding:2px 4px;border-radius:8px;flex-shrink:0}
.del-btn:hover{background:#fff5f5;color:#dc2626}

/* 에러 */
.error-box{background:#fff5f5;border:1px solid #fca5a5;border-radius:12px;padding:12px;color:#dc2626;font-size:.85rem;margin-top:10px;display:none}
.new-btn{width:100%;height:44px;border:1px solid #e5e7eb;border-radius:12px;background:#fff;color:#6b7280;font-size:.88rem;font-weight:700;cursor:pointer;margin-bottom:10px}
.new-btn:hover{background:#f0fff4;color:#2d6a4f;border-color:#2d6a4f}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="clover">🍀</div>
    <h1>Stella Clover</h1>
    <p>AI 회의록 자동 생성</p>
  </div>

  <!-- 입력 섹션 -->
  <div class="card" id="inputSection">
    <div class="card-title">🎙 음성 입력</div>

    <!-- 녹음 버튼 -->
    <button class="rec-btn" id="recBtn" onclick="toggleRec()">
      <span id="recIcon">🎤</span>
      <span id="recText">터치하여 녹음 시작</span>
    </button>

    <!-- 파일 업로드 -->
    <div class="file-area" id="fileArea" onclick="document.getElementById('audioFile').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="dropFile(event)">
      <div style="font-size:1.5rem;margin-bottom:6px">📎</div>
      <div id="fileAreaText">파일 첨부</div>
      <div style="font-size:.75rem;margin-top:4px;opacity:.7">mp3 · m4a · wav · aac · ogg · webm (대용량 OK)</div>
    </div>
    <input type="file" id="audioFile" accept=".mp3,.m4a,.wav,.aac,.ogg,.webm,audio/*" onchange="onFileSelect(this)">

    <!-- 언어 선택 -->
    <div class="lang-row">
      <label for="langSel">🌐 언어</label>
      <select class="lang-sel" id="langSel">
        <option value="ko" selected>한국어 (Korean)</option>
        <option value="en">English</option>
        <option value="ja">日本語 (Japanese)</option>
        <option value="zh">中文 (Chinese)</option>
        <option value="de">Deutsch (German)</option>
        <option value="auto">자동 감지 (Auto)</option>
      </select>
    </div>

    <!-- 생성 버튼 -->
    <button class="gen-btn" id="genBtn" onclick="generate()">
      <span>✨</span> 회의록 생성
    </button>

    <!-- 진행 상태 -->
    <div class="progress" id="progress">
      <div class="progress-step" id="pStep">준비 중...</div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="pBar"></div></div>
      <div class="progress-detail" id="pDetail"></div>
    </div>
    <div class="error-box" id="errBox"></div>
  </div>

  <!-- 결과 섹션 -->
  <div class="card result-area" id="resultSection">
    <div class="card-title">📋 회의록</div>
    <button class="new-btn" onclick="resetAll()">+ 새 회의록</button>
    <div class="summary-box" id="summaryBox"></div>
    <div class="result-btns">
      <button class="rbtn" onclick="copyAll()">📋 복사</button>
      <button class="rbtn" onclick="downloadTxt()">📄 TXT</button>
      <button class="rbtn drive" id="driveBtn" onclick="openDrive()" style="display:none">
        ☁️ Google Drive에서 열기
      </button>
    </div>
  </div>

  <!-- 회의 목록 -->
  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      📅 회의록 이력
      <button onclick="loadMeetings()" style="border:none;background:none;color:#2d6a4f;font-weight:700;cursor:pointer;font-size:.8rem">새로고침</button>
    </div>
    <input class="search-input" id="searchInput" type="search" placeholder="🔍 제목으로 검색..." oninput="onSearchInput()">
    <div id="meetingList"><p style="color:#9ca3af;font-size:.85rem;text-align:center;padding:20px">불러오는 중...</p></div>
  </div>

</div>

<script>
let recorder=null, chunks=[], recordedBlob=null, currentAudioFile=null;
let _driveLink='', _summary='', _title='';
let _searchTimer=null;

// 클라이언트 청크 설정: 120초 × 16kHz × 2byte(mono 16bit PCM) = 3.84MB < Vercel 4.5MB 본문 제한
const TARGET_SR=16000;       // Whisper 권장 16kHz
const CHUNK_SEC=120;         // 청크당 길이(초)
const CHUNK_RETRY=3;         // 청크당 재시도 횟수

// ── 녹음 ──
async function toggleRec(){
  const btn=document.getElementById('recBtn');
  if(recorder && recorder.state==='recording'){
    recorder.stop();
    btn.className='rec-btn done';
    document.getElementById('recIcon').textContent='✅';
    document.getElementById('recText').textContent='녹음 완료 - 회의록 생성 누르세요';
    return;
  }
  try{
    chunks=[];recordedBlob=null;currentAudioFile=null;
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recorder=new MediaRecorder(stream);
    recorder.ondataavailable=e=>chunks.push(e.data);
    recorder.onstop=()=>{
      recordedBlob=new Blob(chunks,{type:'audio/webm'});
      stream.getTracks().forEach(t=>t.stop());
    };
    recorder.start();
    btn.className='rec-btn recording';
    document.getElementById('recIcon').textContent='⏹';
    document.getElementById('recText').textContent='녹음 중... (터치하여 종료)';
  }catch(e){
    showErr('마이크 권한이 필요합니다: '+e.message);
  }
}

// ── 파일 드롭 ──
function dropFile(e){
  e.preventDefault();
  document.getElementById('fileArea').classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f) applyFile(f);
}
function onFileSelect(input){
  if(input.files[0]) applyFile(input.files[0]);
}
function applyFile(f){
  currentAudioFile=f;recordedBlob=null;
  const area=document.getElementById('fileArea');
  area.className='file-area has-file';
  const mb=(f.size/1024/1024);
  const sizeStr = mb>=1 ? mb.toFixed(1)+'MB' : Math.round(f.size/1024)+'KB';
  document.getElementById('fileAreaText').innerHTML='<div class="file-name">'+esc(f.name)+'</div><div style="font-size:.75rem;margin-top:2px">'+sizeStr+'</div>';
}

// ── 진행 상태 표시 ──
function setProgress(pct, step, detail){
  const p=document.getElementById('progress');
  p.style.display='block';
  if(pct!=null) document.getElementById('pBar').style.width=pct+'%';
  if(step!=null) document.getElementById('pStep').textContent=step;
  document.getElementById('pDetail').textContent=detail||'';
}
function showErr(msg){
  const e=document.getElementById('errBox');
  e.textContent=msg;e.style.display='block';
}
function hideErr(){document.getElementById('errBox').style.display='none';}

// ── 오디오 디코딩 → 16kHz mono Float32 ──
async function decodeToMono16k(blob){
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC) throw new Error('이 브라우저는 오디오 디코딩을 지원하지 않습니다.');
  const arrayBuf=await blob.arrayBuffer();
  const ctx=new AC();
  let decoded;
  try{
    decoded=await ctx.decodeAudioData(arrayBuf);
  } finally {
    if(ctx.close) try{ ctx.close(); }catch(_){}
  }
  const OAC=window.OfflineAudioContext||window.webkitOfflineAudioContext;
  if(!OAC) throw new Error('OfflineAudioContext 미지원'); // 리샘플 불가 → 원본 전송 폴백
  const length=Math.max(1, Math.ceil(decoded.duration*TARGET_SR));
  const offline=new OAC(1, length, TARGET_SR); // mono로 자동 다운믹스 + 16kHz 리샘플
  const src=offline.createBufferSource();
  src.buffer=decoded;
  src.connect(offline.destination);
  src.start(0);
  const rendered=await offline.startRendering();
  return rendered.getChannelData(0);
}

// ── Float32 PCM → 16bit mono WAV Blob ──
function encodeWav(samples, sampleRate){
  const bytesPerSample=2;
  const buffer=new ArrayBuffer(44+samples.length*bytesPerSample);
  const view=new DataView(buffer);
  function ws(off,str){ for(let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); }
  ws(0,'RIFF');
  view.setUint32(4, 36+samples.length*bytesPerSample, true);
  ws(8,'WAVE');
  ws(12,'fmt ');
  view.setUint32(16, 16, true);        // fmt 청크 크기
  view.setUint16(20, 1, true);         // PCM
  view.setUint16(22, 1, true);         // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate*bytesPerSample, true); // byte rate
  view.setUint16(32, bytesPerSample, true);            // block align
  view.setUint16(34, 16, true);        // bits per sample
  ws(36,'data');
  view.setUint32(40, samples.length*bytesPerSample, true);
  let off=44;
  for(let i=0;i<samples.length;i++){
    let s=Math.max(-1, Math.min(1, samples[i]));
    s = s<0 ? s*0x8000 : s*0x7FFF;
    view.setInt16(off, s, true);
    off+=2;
  }
  return new Blob([view], {type:'audio/wav'});
}

// ── 청크 1개 전송 (재시도 포함) ──
async function sendChunk(blob, fname, lang, prevText){
  let lastErr;
  for(let attempt=0; attempt<CHUNK_RETRY; attempt++){
    try{
      const fd=new FormData();
      fd.append('audio', blob, fname);
      fd.append('lang', lang);
      if(prevText) fd.append('prevText', prevText);
      const r=await fetch('/api/transcribe',{method:'POST',body:fd});
      // 413(본문 초과) 등은 재시도해도 동일하지만, 일시적 실패 대비 재시도 유지
      const d=await r.json().catch(()=>({ok:false,message:'HTTP '+r.status}));
      if(!r.ok||!d.ok) throw new Error(d.message||('HTTP '+r.status));
      return d.text||'';
    }catch(e){
      lastErr=e;
      if(attempt<CHUNK_RETRY-1){
        await new Promise(res=>setTimeout(res, 1500*(attempt+1)));
      }
    }
  }
  throw lastErr||new Error('청크 전송 실패');
}

// ── 전체 전사: 디코드 → 16kHz mono → 120초 청크 → 순차 전송 ──
async function transcribeAudio(audio, lang){
  let channelData;
  try{
    setProgress(10,'🎙 음성 분석 중...','오디오 디코딩 및 16kHz 변환');
    channelData=await decodeToMono16k(audio);
  }catch(err){
    // 디코딩 실패(미지원 코덱/메모리 등) → 원본 1회 직접 전송(차선책)
    setProgress(30,'🎙 음성 변환 중...','청크 분할 불가 - 원본 직접 전송 시도');
    const fname=(currentAudioFile&&currentAudioFile.name)||'recording.webm';
    return await sendChunk(audio, fname, lang, '');
  }

  const chunkSize=TARGET_SR*CHUNK_SEC;
  const total=channelData.length;
  const nChunks=Math.max(1, Math.ceil(total/chunkSize));
  const parts=[];
  const failed=[];
  let prevText='';

  for(let i=0;i<nChunks;i++){
    const start=i*chunkSize;
    const slice=channelData.subarray(start, Math.min(start+chunkSize, total));
    const wav=encodeWav(slice, TARGET_SR);
    const pct=10+Math.round(40*(i+1)/nChunks);   // 전사 구간: 10% → 50%
    setProgress(pct,'🎙 음성 변환 중...','청크 '+(i+1)+'/'+nChunks+' 변환 중 ('+CHUNK_SEC+'초 단위)');
    try{
      const text=await sendChunk(wav, 'chunk_'+(i+1)+'.wav', lang, prevText);
      if(text && text.trim()){
        parts.push(text.trim());
        prevText=text.trim().slice(-200); // 다음 청크 문맥 연결
      }
    }catch(e){
      // 한 청크가 끝내 실패해도 전체를 버리지 않고 표시 후 계속
      failed.push(i+1);
      parts.push('[구간 '+(i+1)+' 변환 실패]');
    }
  }

  if(failed.length===nChunks){
    throw new Error('모든 구간 변환에 실패했습니다. 파일 형식/네트워크를 확인하세요.');
  }
  if(failed.length){
    showErr('일부 구간('+failed.join(', ')+'/'+nChunks+') 변환에 실패했습니다. 나머지로 회의록을 작성합니다.');
  }
  return parts.join('\n').trim();
}

// ── 메인: 회의록 생성 ──
async function generate(){
  const audio=currentAudioFile||recordedBlob;
  if(!audio){showErr('음성 파일을 선택하거나 녹음해주세요.');return;}

  hideErr();
  document.getElementById('genBtn').disabled=true;
  document.getElementById('resultSection').style.display='none';

  const lang=document.getElementById('langSel').value||'ko';

  try{
    // Step 1: 음성 → 텍스트 (클라이언트 청크 분할 + Whisper)
    const transcript=await transcribeAudio(audio, lang);
    if(!transcript || !transcript.replace(/\[구간 \d+ 변환 실패\]/g,'').trim()){
      throw new Error('음성에서 텍스트를 추출하지 못했습니다. (무음이거나 인식 실패)');
    }

    setProgress(55,'📝 회의록 작성 중...','AI가 회의록을 자동 작성합니다');

    // Step 2: AI 회의록 생성 + Drive 저장
    const fname=(currentAudioFile&&currentAudioFile.name)||'recording.webm';
    const r2=await fetch('/api/summarize',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({transcript, audioFileName:fname, lang})
    });
    const d2=await r2.json().catch(()=>({ok:false,message:'서버 응답 오류'}));
    if(!r2.ok||!d2.ok) throw new Error(d2.message||'회의록 생성 실패');

    setProgress(100,'✅ 완료!','회의록이 생성되었습니다');

    // 결과 표시
    _summary=d2.summary||'';
    _title=d2.title||'회의록';
    _driveLink=d2.driveLink||'';

    document.getElementById('summaryBox').textContent=_summary;
    document.getElementById('resultSection').style.display='block';
    if(_driveLink){
      document.getElementById('driveBtn').style.display='flex';
    }
    // Drive/DB 부분 실패 경고가 있으면 알림(회의록 자체는 성공)
    const w=d2.warnings||{};
    if(w.driveError||w.dbError){
      const notes=[];
      if(w.driveError) notes.push('Drive 저장 실패');
      if(w.dbError) notes.push('이력 저장 실패');
      showErr('회의록은 생성되었으나 '+notes.join(', ')+' (네트워크/권한 확인). 화면의 회의록은 복사·다운로드 가능합니다.');
    }
    document.getElementById('resultSection').scrollIntoView({behavior:'smooth'});
    loadMeetings();

  }catch(e){
    showErr('오류: '+e.message);
    setProgress(0,'실패','오류가 발생했습니다. 다시 시도해주세요.');
  } finally {
    document.getElementById('genBtn').disabled=false;
  }
}

// ── 결과 액션 ──
function copyAll(){
  navigator.clipboard.writeText(_summary).then(()=>{
    const btn=document.querySelector('.rbtn');
    btn.textContent='✓ 복사됨';
    setTimeout(()=>{btn.textContent='📋 복사';},2000);
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=_summary;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');ta.remove();
  });
}
function downloadTxt(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([_summary],{type:'text/plain;charset=utf-8'}));
  a.download=(_title||'회의록')+'.txt';
  a.click();
}
function openDrive(){
  if(_driveLink) window.open(_driveLink,'_blank');
}
function resetAll(){
  recorder=null;chunks=[];recordedBlob=null;currentAudioFile=null;
  _summary='';_title='';_driveLink='';
  document.getElementById('recBtn').className='rec-btn';
  document.getElementById('recIcon').textContent='🎤';
  document.getElementById('recText').textContent='터치하여 녹음 시작';
  document.getElementById('fileArea').className='file-area';
  document.getElementById('fileAreaText').innerHTML='파일 첨부';
  document.getElementById('audioFile').value='';
  document.getElementById('progress').style.display='none';
  document.getElementById('resultSection').style.display='none';
  document.getElementById('driveBtn').style.display='none';
  hideErr();
  document.getElementById('genBtn').disabled=false;
}

// ── 회의 목록 / 검색 ──
function onSearchInput(){
  if(_searchTimer) clearTimeout(_searchTimer);
  _searchTimer=setTimeout(loadMeetings, 300);
}
async function loadMeetings(){
  const list=document.getElementById('meetingList');
  const q=(document.getElementById('searchInput')&&document.getElementById('searchInput').value.trim())||'';
  const url=q?('/api/meetings?q='+encodeURIComponent(q)):'/api/meetings';
  try{
    const r=await fetch(url);
    const d=await r.json();
    const items=d.items||[];
    if(!items.length){
      list.innerHTML='<p style="color:#9ca3af;font-size:.85rem;text-align:center;padding:20px">'+(q?'검색 결과 없음':'회의록 없음')+'</p>';
      return;
    }
    list.innerHTML=items.map(x=>{
      const link=x.drive_link||'';
      const badge=link?'<span class="badge">☁️ Drive</span>':'';
      const dateStr=x.created_at?new Date(x.created_at).toLocaleString('ko-KR'):'';
      return '<div class="meeting-item">'
        +'<div class="meeting-main" onclick="openMeeting(\''+encodeURIComponent(link)+'\')">'
        +'<div class="mtitle">'+esc(x.title||'회의록')+badge+'</div>'
        +'<div class="mdate">'+dateStr+' · '+(x.transcript_chars||0)+'자</div>'
        +'</div>'
        +'<button class="del-btn" title="삭제" onclick="delMeeting('+x.id+',event)">🗑</button>'
        +'</div>';
    }).join('');
  }catch(e){
    list.innerHTML='<p style="color:#ef4444;font-size:.82rem">목록 로드 실패: '+esc(e.message)+'</p>';
  }
}
function openMeeting(encLink){
  const link=decodeURIComponent(encLink||'');
  if(link) window.open(link,'_blank');
}
async function delMeeting(id, ev){
  if(ev) ev.stopPropagation();
  if(!confirm('이 회의록 기록을 삭제할까요? (Drive 파일은 유지됩니다)')) return;
  try{
    const r=await fetch('/api/meetings?action=delete&id='+id,{method:'POST'});
    const d=await r.json();
    if(!d.ok) throw new Error(d.message||'삭제 실패');
    loadMeetings();
  }catch(e){
    showErr('삭제 실패: '+e.message);
  }
}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// 초기 로드
loadMeetings();

// Service Worker 등록 (PWA)
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(function(){});
}
</script>
