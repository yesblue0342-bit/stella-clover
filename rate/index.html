<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stella Rate — 환율 계산기</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a4731">
<meta name="description" content="한국·미국·일본·베트남 실시간 환율 계산기 (Stella Clover) — 사칙연산 지원">
<style>
/* ── 테마 토큰 (Clover / Flow 와 공유: localStorage cl_theme) ── */
:root{
  --bg:#eef3ee; --surface:#ffffff; --surface2:#f4f6f4; --border:#e5e7eb;
  --text:#111827; --text2:#6b7280; --text3:#9ca3af;
  --brand:#1a4731; --brand2:#2d6a4f; --accent:#34d399;
  --shadow:0 2px 12px rgba(0,0,0,.07);
  --key:#eef1ef; --key2:#e3e7e4; --keytext:#111827; --op:#f59e0b; --op2:#f38a13; --optext:#fff;
  --screen:#f7faf8; --screensel:#eafaf1;
}
[data-theme=dark]{
  --bg:#0d130f; --surface:#151d18; --surface2:#1b241d; --border:#28352c;
  --text:#e9f1ec; --text2:#9fb3a7; --text3:#7d8f84;
  --brand:#34d399; --brand2:#5eead4; --accent:#34d399;
  --shadow:0 2px 14px rgba(0,0,0,.45);
  --key:#2a332c; --key2:#333d35; --keytext:#eef3ef; --op:#f59e0b; --op2:#f97316; --optext:#fff;
  --screen:#12191400; --screensel:rgba(52,211,153,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;transition:background .2s,color .2s}
button{font-family:inherit;cursor:pointer}

.appbar{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;flex:0 0 auto}
.appbar-in{max-width:520px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:9px 12px}
.logo{display:flex;align-items:center;gap:6px;font-weight:900;font-size:1.02rem;white-space:nowrap}
.logo .leaf{font-size:1.2rem}
.spacer{flex:1}
.linkbtn{border:none;background:rgba(255,255,255,.16);color:#fff;border-radius:9px;padding:6px 10px;font-size:.78rem;font-weight:700;text-decoration:none;min-height:36px;display:flex;align-items:center;gap:4px}
.iconbtn{border:none;background:rgba(255,255,255,.16);color:#fff;border-radius:9px;width:38px;height:36px;font-size:1rem}

/* 계산기 셸 */
.calc{flex:1 1 auto;width:100%;max-width:520px;margin:0 auto;display:flex;flex-direction:column;min-height:0}

/* ── 상단: 통화 행(스크린) ── */
.screen{flex:0 0 auto;padding:6px 12px 10px;background:var(--screen)}
.crow{display:flex;align-items:center;gap:12px;padding:12px 12px;border-radius:16px;margin-top:8px;border:2px solid transparent;transition:background .15s,border-color .15s}
.crow:active{transform:scale(.997)}
.crow.sel{background:var(--screensel);border-color:var(--accent)}
.cflag{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:var(--surface2);flex:0 0 auto;box-shadow:inset 0 0 0 1px var(--border)}
.cmeta{line-height:1.15}
.ccode{font-weight:800;font-size:.9rem}
.cname{font-size:.7rem;color:var(--text3)}
.camt{margin-left:auto;text-align:right;min-width:0;overflow:hidden}
.camt .v{font-size:1.7rem;font-weight:800;letter-spacing:-.5px;line-height:1.15;word-break:break-all}
.crow.sel .camt .v{color:var(--brand2)}
.camt .sym{font-size:.85rem;color:var(--text3);font-weight:700}

@media(max-width:400px){.camt .v{font-size:1.45rem}.cflag{width:38px;height:38px;font-size:1.35rem}}

/* ── 하단 상태바 ── */
.statusbar{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:.72rem;color:var(--text3);border-top:1px solid var(--border)}
.sb-btn{border:none;background:transparent;color:var(--text2);font-size:1.15rem;width:34px;height:34px;border-radius:8px}
.sb-btn:hover{background:var(--surface2)}
.sb-mid{flex:1;text-align:center;line-height:1.3}
.sb-mid .t{color:var(--accent);font-weight:700}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);vertical-align:middle;margin-right:4px}
.dot.stale{background:#f59e0b}.dot.off{background:#ef4444}

/* ── 키패드 ── */
.pad{flex:1 1 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);min-height:340px}
.key{border:none;background:var(--key);color:var(--keytext);font-size:1.5rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:filter .1s,background .1s}
.key:active{filter:brightness(.92)}
.key.fn{background:var(--key2);color:var(--text2);font-size:1.25rem}
.key.op{background:var(--op);color:var(--optext);font-size:1.7rem;font-weight:800}
.key.op:active{background:var(--op2)}
.key.eq{background:var(--op);color:var(--optext);font-size:1.9rem;font-weight:900}
.key.op.on{background:var(--op2);box-shadow:inset 0 0 0 3px rgba(255,255,255,.55)}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:var(--brand);color:#fff;padding:10px 16px;border-radius:12px;font-size:.82rem;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:50;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="appbar"><div class="appbar-in">
  <div class="logo"><span class="leaf">💱</span> Stella Rate</div>
  <div class="spacer"></div>
  <a class="linkbtn" href="/" title="Stella Clover">🍀</a>
  <a class="linkbtn" href="/flow" title="Stella Flow">🔀</a>
  <button class="iconbtn" id="themeToggle" onclick="toggleTheme()" title="다크/라이트">🌙</button>
</div></div>

<div class="calc">
  <div class="screen" id="screen"></div>

  <div class="statusbar">
    <button class="sb-btn" onclick="loadRates(true)" title="환율 새로고침">↻</button>
    <div class="sb-mid" id="statusMid"><span class="dot" id="dot"></span><span id="statusText">환율 불러오는 중…</span></div>
    <button class="sb-btn" onclick="info()" title="정보">ⓘ</button>
  </div>

  <div class="pad" id="pad"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var $=function(id){return document.getElementById(id);};
/* 대상국가: 한국 / 미국 / 일본 / 베트남 */
var CUR={
  KRW:{flag:'🇰🇷',sym:'₩',name:'대한민국 원',dp:0},
  USD:{flag:'🇺🇸',sym:'$',name:'미국 달러',dp:2},
  JPY:{flag:'🇯🇵',sym:'¥',name:'일본 엔',dp:0},
  VND:{flag:'🇻🇳',sym:'₫',name:'베트남 동',dp:0}
};
var ORDER=['KRW','USD','JPY','VND'];
var RATES_KEY='cl_fx_rates', THEME_KEY='cl_theme';
var FALLBACK={USD:1,KRW:1360,JPY:157,VND:25400}; // 오프라인 근사(USD 기준)
var _rates=FALLBACK, _ts=0, _online=false;

var base='KRW';        // 현재 입력(기준) 통화
var expr='1000000';    // 계산기 수식(기준 통화 금액). 사칙연산 지원.

/* ── 테마 ── */
function applyTheme(){var t=localStorage.getItem(THEME_KEY)||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme',t);$('themeToggle').textContent=t==='dark'?'☀️':'🌙';}
function toggleTheme(){var cur=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  localStorage.setItem(THEME_KEY,cur);applyTheme();}

var _tt;
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},2200);}
function info(){toast('환율 소스: open.er-api.com (무료·무키). '+(_online?'실시간':(_ts?'저장본(오프라인)':'근사값')));}

/* ── 사칙연산 계산기 (eval 미사용, ×÷ 우선순위 처리) ── */
var OPS=/[+\-×÷]/;
function evalExpr(e){
  var toks=String(e).match(/(\d+\.?\d*|\.\d+|[+\-×÷])/g);
  if(!toks) return 0;
  while(toks.length && OPS.test(toks[toks.length-1])) toks.pop(); // 끝의 연산자 제거
  if(!toks.length) return 0;
  var p1=[toks[0]]; // 1차: × ÷
  for(var i=1;i<toks.length;i+=2){
    var op=toks[i], num=toks[i+1];
    if(num==null) break;
    if(op==='×'||op==='÷'){ var a=parseFloat(p1.pop()), b=parseFloat(num); p1.push(op==='×'?a*b:(b===0?0:a/b)); }
    else { p1.push(op); p1.push(num); }
  }
  var res=parseFloat(p1[0]); // 2차: + -
  for(var j=1;j<p1.length;j+=2){ var o=p1[j], n=parseFloat(p1[j+1]); if(isNaN(n))break; res=(o==='+')?res+n:res-n; }
  return isFinite(res)?res:0;
}
function fmtExpr(e){
  return String(e).replace(/\d+\.?\d*|\.\d+/g,function(num){
    if(/\.$/.test(num)){ return Number(num.slice(0,-1)||0).toLocaleString('en-US')+'.'; }
    if(num.indexOf('.')>=0){ var s=num.split('.'); return Number(s[0]||0).toLocaleString('en-US')+'.'+s[1]; }
    return Number(num).toLocaleString('en-US');
  }).replace(/([+\-×÷])/g,' $1 ');
}
function fmtNum(v,dp){ if(!isFinite(v))return '—'; return v.toLocaleString('en-US',{minimumFractionDigits:dp,maximumFractionDigits:dp}); }

/* USD 기준 rates 로 A→B 환산 */
function convert(amount,from,to){ var rf=_rates[from], rt=_rates[to]; if(!rf||!rt)return NaN; return amount*(rt/rf); }

/* ── 입력 처리 ── */
function press(k){
  var last=expr.slice(-1);
  if(/[0-9]/.test(k)){
    if(expr==='0') expr=k;
    else expr+=k;
  } else if(k==='.'){
    // 현재 숫자 조각에 소수점이 없을 때만
    var seg=expr.split(/[+\-×÷]/).pop();
    if(seg.indexOf('.')<0) expr+= (seg===''?'0.':'.');
  } else if(OPS.test(k)){
    if(expr==='') return;
    if(OPS.test(last)) expr=expr.slice(0,-1)+k; // 연산자 교체
    else expr+=k;
  } else if(k==='='){
    expr=String(evalExpr(expr));
  } else if(k==='C'){
    expr='0';
  } else if(k==='back'){
    expr=expr.slice(0,-1); if(expr===''||expr==='-') expr='0';
  } else if(k==='pct'){
    expr=String(evalExpr(expr)/100);
  } else if(k==='swap'){
    var idx=ORDER.indexOf(base); base=ORDER[(idx+1)%ORDER.length]; // 기준 통화 순환
  }
  render();
}

/* ── 렌더 ── */
function renderScreen(){
  var val=evalExpr(expr);
  var pending=OPS.test(expr.slice(-1)); // 연산자 대기 중
  var html='';
  ORDER.forEach(function(code){
    var meta=CUR[code], sel=(code===base);
    var disp = sel ? (fmtExpr(expr) + (pending?'':'')) : (fmtNum(convert(val,base,code),meta.dp));
    html+='<div class="crow'+(sel?' sel':'')+'" onclick="selectBase(\''+code+'\')">'
      +'<div class="cflag">'+meta.flag+'</div>'
      +'<div class="cmeta"><div class="ccode">'+code+'</div><div class="cname">'+meta.name+'</div></div>'
      +'<div class="camt"><div class="v"><span class="sym">'+meta.sym+'</span> '+disp+'</div></div>'
      +'</div>';
  });
  $('screen').innerHTML=html;
}
function selectBase(code){
  if(code===base) return;
  // 다른 통화 행을 누르면 그 통화의 현재 환산값을 새 기준 금액으로 이어받아 편집
  var val=evalExpr(expr);
  var nv=convert(val,base,code);
  base=code;
  expr = isFinite(nv) ? String(Math.round(nv*100)/100) : '0';
  if(expr==='0') expr='0';
  render();
}
function render(){ renderScreen(); renderRateLine(); }

function renderRateLine(){
  var next=ORDER[(ORDER.indexOf(base)+1)%ORDER.length];
  var per=convert(1,base,next);
  var when = _ts ? new Date(_ts).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
  var line='1 '+base+' = '+CUR[next].sym+fmtNum(per,4)+' '+next;
  $('statusText').innerHTML = (_online?'실시간 · ':(_ts?'저장본 · ':'근사값 · ')) + '<span class="t">'+line+'</span>' + (when?('  ·  '+when):'');
  var d=$('dot'); d.className='dot'+(_online?'':(_ts?' stale':' off'));
}

/* ── 키패드 구성 ── */
var KEYS=[
  {t:'C',k:'C',c:'fn'},{t:'←',k:'back',c:'fn'},{t:'↕',k:'swap',c:'fn'},{t:'÷',k:'÷',c:'op'},
  {t:'7',k:'7'},{t:'8',k:'8'},{t:'9',k:'9'},{t:'×',k:'×',c:'op'},
  {t:'4',k:'4'},{t:'5',k:'5'},{t:'6',k:'6'},{t:'−',k:'-',c:'op'},
  {t:'1',k:'1'},{t:'2',k:'2'},{t:'3',k:'3'},{t:'+',k:'+',c:'op'},
  {t:'0',k:'0'},{t:'.',k:'.'},{t:'%',k:'pct'},{t:'=',k:'=',c:'eq'}
];
function buildPad(){
  $('pad').innerHTML=KEYS.map(function(x){
    return '<button class="key'+(x.c?(' '+x.c):'')+'" data-k="'+x.k+'">'+x.t+'</button>';
  }).join('');
  $('pad').querySelectorAll('.key').forEach(function(b){ b.addEventListener('click',function(){ press(b.getAttribute('data-k')); }); });
}
/* 물리 키보드 지원 */
window.addEventListener('keydown',function(e){
  var m={'/':'÷','*':'×','x':'×','-':'-','+':'+','=':'=','Enter':'=','.':'.','%':'pct','Backspace':'back','Delete':'C','c':'C','C':'C'};
  if(/[0-9]/.test(e.key)){ press(e.key); e.preventDefault(); return; }
  if(m[e.key]!=null){ press(m[e.key]); e.preventDefault(); }
});

/* ── 환율 로딩 (무키 공개 API, 실패 시 캐시→폴백) ── */
function applyRates(rates,ts,online){ _rates=rates; _ts=ts; _online=online; render(); }
async function loadRates(force){
  var cached=null; try{cached=JSON.parse(localStorage.getItem(RATES_KEY)||'null');}catch(e){}
  if(cached&&cached.rates){ applyRates(cached.rates,cached.ts,true); if(!force&&(Date.now()-cached.ts)<6*3600*1000) return; }
  var urls=['https://open.er-api.com/v6/latest/USD','https://api.exchangerate.host/latest?base=USD'];
  for(var i=0;i<urls.length;i++){
    try{
      var r=await fetch(urls[i],{cache:'no-store'});
      var d=await r.json();
      var raw=d&&(d.rates||d.conversion_rates);
      if(raw&&raw.KRW&&raw.JPY&&raw.VND){
        var rates={USD:1,KRW:+raw.KRW,JPY:+raw.JPY,VND:+raw.VND}, ts=Date.now();
        try{localStorage.setItem(RATES_KEY,JSON.stringify({rates:rates,ts:ts}));}catch(e){}
        applyRates(rates,ts,true); return;
      }
    }catch(e){}
  }
  if(cached&&cached.rates) applyRates(cached.rates,cached.ts,false);
  else applyRates(FALLBACK,0,false);
}

/* ── 초기화 ── */
applyTheme(); buildPad(); render(); loadRates(false);
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}
</script>
</body>
</html>
